<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avior — Daily CAPAD Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --navy: #0d1b2a;
  --navy-mid: #162235;
  --navy-light: #1e3050;
  --teal: #2ec4b6;
  --teal-dim: rgba(46,196,182,0.18);
  --amber: #f4a261;
  --red: #e76f51;
  --green: #52b788;
  --white: #f0f4f8;
  --muted: #7a92a8;
  --card: rgba(255,255,255,0.03);
  --card-b: rgba(255,255,255,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(46,196,182,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(46,196,182,0.035) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:2rem 2rem 4rem;}

/* Header */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--teal-dim);}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-mark{width:40px;height:40px;background:var(--teal);clip-path:polygon(20% 0%,80% 0%,100% 20%,100% 80%,80% 100%,20% 100%,0% 80%,0% 20%);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--navy);flex-shrink:0;}
.brand-name{font-size:18px;font-weight:600;letter-spacing:.08em;}
.brand-sub{font-size:11px;font-weight:300;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.header-right{text-align:right;}
.report-title{font-size:22px;font-weight:600;color:var(--teal);letter-spacing:-.02em;}
