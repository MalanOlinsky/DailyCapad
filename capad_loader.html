async function loadData() {
  const btn = document.getElementById('loadBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    await window.storage.set('capad_daily_records', JSON.stringify(DATA));

    // Verify it saved
    const check = await window.storage.get('capad_daily_records');
    const saved = check ? JSON.parse(check.value) : [];

    if (saved.length === DATA.length) {
      status.className = 'status ok';
      status.textContent = '✓ ' + saved.length + ' records loaded successfully';
      btn.textContent = '✓ Done';

      // Show record list
      const latest = saved[saved.length - 1];
      let html = '<div class="record-list">';
      [...saved].reverse().forEach(r => {
        html += `<div class="record-row"><span>${r.dateLabel}</span><span>R${(r.alc/1e6).toFixed(1)}M &nbsp; ${r.coverage.toFixed(1)}%</span></div>`;
      });
      html += '</div>';
      document.getElementById('recordList').innerHTML = html;
      document.getElementById('goLink').style.display = 'block';
    } else {
      throw new Error('Verification failed — saved ' + saved.length + ' of ' + DATA.length);
    }
  } catch(e) {
    status.className = 'status err';
    status.textContent = '✗ Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Try Again';
  }
}
