name: CAPAD Daily Update

on:
  schedule:
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  update-capad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CAPAD_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run CAPAD update script
        run: node .github/scripts/update-capad.js

      - name: Commit and push
        run: |
          git config user.name "CAPAD Bot"
          git config user.email "capad@avior.co.za"
          git add capad_dashboard_1.html
          git diff --staged --quiet || git commit -m "CAPAD auto-update $(date +'%Y-%m-%d')"
          git push
